version: "3.8"

# ============================================================================
# All BI Tools — full stack for comparison & experimentation
# Starts: shared PostgreSQL, Metabase, Superset, Grafana, Redash
#
# Resource usage: ~4 GB RAM recommended with all tools running
# ============================================================================

services:

  # ==========================================================================
  # Shared PostgreSQL (analytics data source)
  # ==========================================================================
  bi-postgres:
    image: postgres:16
    container_name: bi_postgres
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst_pass
    ports:
      - "5439:5432"
    volumes:
      - bi_postgres_data:/var/lib/postgresql/data
      - ./sample-data.sql:/docker-entrypoint-initdb.d/01-sample-data.sql
    command: >
      postgres
      -c shared_preload_libraries='pg_stat_statements'
      -c pg_stat_statements.track=all
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bi-network

  # ==========================================================================
  # Metabase — http://localhost:5000
  # ==========================================================================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "5000:3000"
    restart: unless-stopped
    networks:
      - bi-network

  # ==========================================================================
  # Apache Superset — http://localhost:8088
  # ==========================================================================
  superset:
    image: apache/superset:latest
    container_name: superset
    environment:
      SUPERSET_SECRET_KEY: "change_me_to_a_random_string_1234567890"
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
      - superset_config:/app/pythonpath
    restart: unless-stopped
    networks:
      - bi-network

  superset-init:
    image: apache/superset:latest
    container_name: superset_init
    depends_on:
      - superset
    environment:
      SUPERSET_SECRET_KEY: "change_me_to_a_random_string_1234567890"
    entrypoint: >
      /bin/sh -c "
        pip install psycopg2-binary &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@admin.com --password admin &&
        superset db upgrade &&
        superset init
      "
    networks:
      - bi-network

  # ==========================================================================
  # Grafana — http://localhost:3000
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - bi-network

  # ==========================================================================
  # Redash — http://localhost:5001
  # ==========================================================================
  redash_server:
    image: redash/redash:latest
    container_name: redash_server
    environment:
      REDASH_REDIS_URL: "redis://redis:6379/0"
      REDASH_DATABASE_URL: "postgresql://redash:redash_pass@redash_db/redash"
      REDASH_COOKIE_SECRET: "change_me_to_random_string_123"
      REDASH_SECRET_KEY: "change_me_to_another_random_456"
    ports:
      - "5001:5000"
    depends_on:
      redash_db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - bi-network

  redash_scheduler:
    image: redash/redash:latest
    container_name: redash_scheduler
    command: scheduler
    environment:
      REDASH_REDIS_URL: "redis://redis:6379/0"
      REDASH_DATABASE_URL: "postgresql://redash:redash_pass@redash_db/redash"
    depends_on:
      redash_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bi-network

  redash_worker:
    image: redash/redash:latest
    container_name: redash_worker
    command: worker
    environment:
      REDASH_REDIS_URL: "redis://redis:6379/0"
      REDASH_DATABASE_URL: "postgresql://redash:redash_pass@redash_db/redash"
      QUEUES: "queries,scheduled_queries,celery"
      WORKERS_COUNT: 2
    depends_on:
      redash_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bi-network

  redash_db:
    image: postgres:16
    container_name: redash_db
    environment:
      POSTGRES_DB: redash
      POSTGRES_USER: redash
      POSTGRES_PASSWORD: redash_pass
    volumes:
      - redash_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redash -d redash"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bi-network

  redis:
    image: redis:7-alpine
    container_name: redash_redis
    restart: unless-stopped
    networks:
      - bi-network

volumes:
  bi_postgres_data:
  metabase_data:
  superset_data:
  superset_config:
  grafana_data:
  redash_postgres:

networks:
  bi-network:
    name: bi-network
    driver: bridge
